services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-onsite_ops_system}
      MYSQL_USER: ${MYSQL_USER:-onsite_ops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-onsite_ops_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  onsite-ops-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: onsite-ops-system:latest
    pull_policy: never
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-onsite_ops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-onsite_ops_password}
      MYSQL_DATABASE: onsite_ops_system
      ALLOW_FILE_DB_FALLBACK: "false"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-onsite_ops_system}
      MYSQL_USER: ${MYSQL_USER:-onsite_ops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  onsite-ops-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: onsite-ops-system:${APP_VERSION:-1.0.3}
    pull_policy: never
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-onsite_ops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-onsite_ops_system}
      ALLOW_FILE_DB_FALLBACK: "false"
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      INITIAL_ENGINEER_PASSWORD: ${INITIAL_ENGINEER_PASSWORD}
      INITIAL_ADMIN_SECURITY_QUESTION: ${INITIAL_ADMIN_SECURITY_QUESTION:-管理员安全问题}
      INITIAL_ADMIN_SECURITY_ANSWER: ${INITIAL_ADMIN_SECURITY_ANSWER}
      INITIAL_ENGINEER_SECURITY_QUESTION: ${INITIAL_ENGINEER_SECURITY_QUESTION:-工程师安全问题}
      INITIAL_ENGINEER_SECURITY_ANSWER: ${INITIAL_ENGINEER_SECURITY_ANSWER}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      UPGRADE_SIGNING_KEY: ${UPGRADE_SIGNING_KEY}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-604800}
      WEB_IDLE_LOGOUT_MINUTES: ${WEB_IDLE_LOGOUT_MINUTES:-30}
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-600000}
      LOGIN_RATE_LIMIT_LOCK_MS: ${LOGIN_RATE_LIMIT_LOCK_MS:-900000}
      LOCAL_BACKUP_RETENTION_DAYS: ${LOCAL_BACKUP_RETENTION_DAYS:-30}
      AUDIT_ARCHIVE_RETENTION_DAYS: ${AUDIT_ARCHIVE_RETENTION_DAYS:-180}
      MAINTENANCE_INTERVAL_MS: ${MAINTENANCE_INTERVAL_MS:-60000}
      CONFIG_BACKUP_ALLOWED_COMMANDS: ${CONFIG_BACKUP_ALLOWED_COMMANDS:-show running-config,display current-configuration,show configuration}
    volumes:
      - app-data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql-data:
  app-data:
